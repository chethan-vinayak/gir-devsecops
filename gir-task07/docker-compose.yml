version: "3.9"

services:
  web:
    build: .
    container_name: gir-web
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - gir-network

  redis:
    image: redis:7-alpine
    container_name: gir-redis
    networks:
      - gir-network

networks:
  gir-network:
    driver: bridge
